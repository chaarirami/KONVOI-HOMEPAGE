<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family:sans-serif;background:#f0f4f8">
  <rect width="800" height="400" fill="#f0f4f8" rx="8"/>
  <!-- Simplified trailer outline -->
  <rect x="80" y="120" width="600" height="180" fill="none" stroke="#334155" stroke-width="3" rx="4"/>
  <rect x="60" y="150" width="30" height="120" fill="none" stroke="#334155" stroke-width="2" rx="2"/>
  <!-- Sensor position markers -->
  <circle cx="200" cy="130" r="12" fill="#3b82f6" opacity="0.8"/>
  <text x="200" y="110" text-anchor="middle" font-size="11" fill="#1e40af">Vorne links</text>
  <circle cx="520" cy="130" r="12" fill="#3b82f6" opacity="0.8"/>
  <text x="520" y="110" text-anchor="middle" font-size="11" fill="#1e40af">Vorne rechts</text>
  <circle cx="340" cy="295" r="12" fill="#10b981" opacity="0.8"/>
  <text x="340" y="325" text-anchor="middle" font-size="11" fill="#065f46">GPS Haupt</text>
  <circle cx="130" cy="210" r="10" fill="#f59e0b" opacity="0.8"/>
  <text x="130" y="245" text-anchor="middle" font-size="10" fill="#92400e">Schock</text>
  <circle cx="620" cy="210" r="10" fill="#f59e0b" opacity="0.8"/>
  <text x="620" y="245" text-anchor="middle" font-size="10" fill="#92400e">Schock</text>
  <!-- Legend -->
  <circle cx="90" cy="370" r="7" fill="#3b82f6"/>
  <text x="104" y="374" font-size="11" fill="#334155">Bewegungssensor</text>
  <circle cx="220" cy="370" r="7" fill="#10b981"/>
  <text x="234" y="374" font-size="11" fill="#334155">GPS-Modul</text>
  <circle cx="320" cy="370" r="7" fill="#f59e0b"/>
  <text x="334" y="374" font-size="11" fill="#334155">Schocksensor</text>
  <text x="400" y="60" text-anchor="middle" font-size="14" fill="#64748b">Sensorpositionen am Trailer — Platzhalter (wird vor Launch ersetzt)</text>
</svg>
