  # ---------------------------------------------------------------------------
  # Team Members (bilingual single-file)
  # ---------------------------------------------------------------------------
  - name: team
    label: Team
    label_singular: Team Member
    folder: src/content/team
    create: true
    slug: '{{fields.name.de}}'
    extension: md
    fields:
      - label: Name
        name: name
        widget: object
        fields:
          - { label: 'Name (DE)', name: de, widget: string }
          - { label: 'Name (EN)', name: en, widget: string }
      - label: Job Title
        name: title
        widget: object
        fields:
          - { label: 'Title (DE)', name: de, widget: string }
          - { label: 'Title (EN)', name: en, widget: string }
      - label: Bio
        name: bio
        widget: object
        fields:
          - { label: 'Bio (DE)', name: de, widget: text }
          - { label: 'Bio (EN)', name: en, widget: text }
      - label: Photo
        name: photo
        widget: string
        required: false
        hint: 'Filename only, e.g. "rami.png". File must exist in src/assets/images/team/.'
      - { label: Email, name: email, widget: string, required: false }
      - { label: Phone, name: phone, widget: string, required: false }
      - label: Display Order
        name: order
        widget: number
        required: false
        hint: 'Lower number = shown first.'

  # ---------------------------------------------------------------------------
  # Events (bilingual single-file)
  # ---------------------------------------------------------------------------
  - name: event
    label: Events
    label_singular: Event
    folder: src/content/event
    create: true
    slug: '{{slug}}'
    extension: md
    fields:
      - label: Name
        name: name
        widget: object
        fields:
          - { label: 'Name (DE)', name: de, widget: string }
          - { label: 'Name (EN)', name: en, widget: string }
      - label: Description
        name: description
        widget: object
        required: false
        fields:
          - { label: 'Description (DE)', name: de, widget: text }
          - { label: 'Description (EN)', name: en, widget: text }
      - { label: Start Date, name: startDate, widget: datetime }
      - { label: End Date, name: endDate, widget: datetime, required: false }
      - { label: Location, name: location, widget: string, required: false }
      - { label: URL, name: url, widget: string, required: false }
