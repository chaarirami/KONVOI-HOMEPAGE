# =============================================================================
# Decap CMS configuration — KONVOI Homepage
# =============================================================================

backend:
  name: github
  repo: KONVOI-HH/KONVOI-HOMEPAGE
  branch: main
  base_url: https://konvoi-homepage.pages.dev/api
  auth_endpoint: /auth

publish_mode: editorial_workflow

media_folder: public/images/uploads
public_folder: /images/uploads

slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: '-'

# =============================================================================
# Shared field definition (YAML anchor — works for single objects)
# =============================================================================

_metadata_fields: &metadata_fields
  label: SEO Metadata
  name: metadata
  widget: object
  required: false
  collapsed: true
  fields:
    - { label: Meta Title, name: title, widget: string, required: false }
    - { label: Meta Description, name: description, widget: text, required: false }

# =============================================================================
# Collections
# =============================================================================

collections:

  # ---------------------------------------------------------------------------
  # Blog Posts (DE)
  # ---------------------------------------------------------------------------
  - name: post-de
    label: 'Blog Posts (DE)'
    label_singular: 'Blog Post (DE)'
    folder: src/content/post/de
    create: true
    slug: '{{slug}}'
    extension: md
    fields:
      - { label: Locale, name: locale, widget: hidden, default: de }
      - label: Translation Key
        name: translationKey
        widget: string
        hint: 'Unique key shared with the EN version. Use kebab-case, e.g. "cargo-crime-europe-2024"'
      - label: Canonical Key
        name: canonicalKey
        widget: string
        hint: 'URL slug for this post. Use kebab-case.'
      - { label: Title, name: title, widget: string }
      - { label: Excerpt, name: excerpt, widget: text, required: false }
      - { label: Publish Date, name: publishDate, widget: datetime, required: false }
      - { label: Update Date, name: updateDate, widget: datetime, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false, required: false }
      - { label: Image, name: image, widget: image, required: false }
      - { label: Category, name: category, widget: string, required: false }
      - label: Tags
        name: tags
        widget: list
        required: false
        field: { label: Tag, name: tag, widget: string }
      - { label: Author, name: author, widget: string, required: false, default: 'KONVOI Redaktion' }
      - *metadata_fields
      - { label: Body, name: body, widget: markdown }

  # ---------------------------------------------------------------------------
  # Blog Posts (EN)
  # ---------------------------------------------------------------------------
  - name: post-en
    label: 'Blog Posts (EN)'
    label_singular: 'Blog Post (EN)'
    folder: src/content/post/en
    create: true
    slug: '{{slug}}'
    extension: md
    fields:
      - { label: Locale, name: locale, widget: hidden, default: en }
      - label: Translation Key
        name: translationKey
        widget: string
        hint: 'Must match the DE version exactly.'
      - label: Canonical Key
        name: canonicalKey
        widget: string
        hint: 'URL slug for this post. Use kebab-case.'
      - { label: Title, name: title, widget: string }
      - { label: Excerpt, name: excerpt, widget: text, required: false }
      - { label: Publish Date, name: publishDate, widget: datetime, required: false }
      - { label: Update Date, name: updateDate, widget: datetime, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false, required: false }
      - { label: Image, name: image, widget: image, required: false }
      - { label: Category, name: category, widget: string, required: false }
      - label: Tags
        name: tags
        widget: list
        required: false
        field: { label: Tag, name: tag, widget: string }
      - { label: Author, name: author, widget: string, required: false, default: 'KONVOI Editorial' }
      - *metadata_fields
      - { label: Body, name: body, widget: markdown }

