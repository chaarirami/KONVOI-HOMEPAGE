      - { label: Locale, name: locale, widget: hidden, default: de }
      - label: Translation Key
        name: translationKey
        widget: string
        hint: 'Unique key shared with the EN version. Use kebab-case.'
      - label: Canonical Key
        name: canonicalKey
        widget: string
        hint: 'URL slug for this job listing. Use kebab-case.'
      - { label: Title, name: title, widget: string }
      - { label: Department, name: department, widget: string, required: false }
      - label: Type
        name: type
        widget: select
        required: false
        options:
          - { label: Full-time, value: fulltime }
          - { label: Internship, value: internship }
          - { label: Initiative, value: initiative }
      - { label: Apply Email, name: applyEmail, widget: string, required: false, default: 'applications@konvoi.eu' }
      - { label: Publish Date, name: publishDate, widget: datetime, required: false }
