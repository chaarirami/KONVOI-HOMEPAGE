[build]
  publish = "dist"
  command = "pnpm run build"

[build.environment]
  NODE_VERSION = "24"

[build.processing.html]
  pretty_urls = false

# Deploy Previews: noindex is handled by Layout.astro isNonProduction check.
# This environment variable makes CONTEXT available to Astro at build time.
[context.deploy-preview.environment]
  CONTEXT = "deploy-preview"

# Branch deploys: disabled — only main branch deploys as branch deploy.
# All other branches get Deploy Previews when a PR is opened.
[context.branch-deploy]
  command = "echo 'Branch deploy disabled — open a PR for a Deploy Preview'"

# Cache immutable Astro-hashed assets
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
